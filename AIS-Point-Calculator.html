<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIS ポイント計算機</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --s0:#fdf9f5;--s1:#f7f2eb;--s2:#ece7e0;--s3:#d4ccc2;--s4:#b0a699;--s5:#857870;--s6:#584e47;--s7:#38302b;
      --grad-header:linear-gradient(135deg,#d4ccc2 0%,#e8e3da 45%,#f7f2eb 100%);
      --grad-active:linear-gradient(135deg,#584e47 0%,#857870 100%);
      --grad-btn:linear-gradient(135deg,#857870 0%,#b0a699 100%);
      --grad-total:linear-gradient(145deg,#d4ccc2 0%,#e2dbd4 45%,#ece7e0 100%);
      --grad-savings:linear-gradient(135deg,#c8c0b6 0%,#d4ccc2 100%);
      --shadow-sm:0 2px 10px rgba(88,78,71,.10);
      --shadow-md:0 5px 20px rgba(88,78,71,.14);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--s0);color:var(--s6);min-height:100vh;}

    /* ===== HEADER ===== */
    header{background:var(--grad-header);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 3px 18px rgba(88,78,71,.15);border-bottom:1px solid var(--s3);}
    .logo-badge{width:34px;height:34px;border-radius:9px;background:var(--grad-active);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--s0);flex-shrink:0;box-shadow:var(--shadow-sm);}
    .logo-name{font-size:14px;font-weight:900;color:var(--s6);letter-spacing:2px;}
    .logo-sub{font-size:9px;font-weight:300;color:var(--s5);letter-spacing:2px;}
    .h-sep{width:1px;height:26px;background:var(--s3);margin:0 4px;}
    .spacer{flex:1;}
    .hbtn{padding:6px 14px;border-radius:7px;border:1px solid var(--s3);background:rgba(255,255,255,.5);color:var(--s6);font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .18s;}
    .hbtn:hover{background:rgba(255,255,255,.8);}

    /* ===== MOBILE BOTTOM NAV ===== */
    .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--s1);border-top:1px solid var(--s3);box-shadow:0 -4px 16px rgba(88,78,71,.12);}
    .mobile-nav-inner{display:flex;}
    .mnav-btn{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:var(--s4);font-size:9px;font-weight:600;letter-spacing:.5px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;position:relative;}
    .mnav-btn .micon{font-size:20px;line-height:1;}
    .mnav-btn.active{color:var(--s6);}
    .mnav-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--grad-active);border-radius:0 0 2px 2px;}
    .mnav-badge{position:absolute;top:6px;right:calc(50% - 18px);background:var(--grad-active);color:white;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

    /* ===== DESKTOP LAYOUT ===== */
    .app{display:grid;grid-template-columns:300px 1fr 280px;height:calc(100vh - 56px);}
    .panel{overflow-y:auto;border-right:1px solid var(--s3);}
    .panel:last-child{border-right:none;}
    .panel-left{background:linear-gradient(180deg,#f7f2eb,#f0ebe3);}
    .panel-mid{background:linear-gradient(180deg,#fdf9f5,#f7f2eb);}
    .panel-right{background:linear-gradient(180deg,#f0ebe3,#e8e3da);}
    .panel-hd{padding:12px 16px;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--s3);}
    .panel-left .panel-hd{background:linear-gradient(90deg,#d4ccc2,#e2dbd4);color:var(--s6);}
    .panel-mid .panel-hd{background:linear-gradient(90deg,#ddd8d0,#eae5de);color:var(--s6);}
    .panel-right .panel-hd{background:linear-gradient(90deg,#cec6bc,#d8d0c8);color:var(--s6);}

    /* ===== MOBILE LAYOUT ===== */
    @media(max-width:767px){
      .app{display:block;height:calc(100vh - 56px - 62px);overflow:hidden;}
      .panel{height:100%;display:none;border-right:none;}
      .panel.active-panel{display:flex;flex-direction:column;}
      .panel-hd{flex-shrink:0;}
      .panel-left .panel-hd,
      .panel-mid .panel-hd,
      .panel-right .panel-hd{background:linear-gradient(90deg,#d4ccc2,#e2dbd4);}
      .mobile-nav{display:block;}
      /* 中パネルの内コンテンツをスクロール可能に */
      .panel-mid-scroll{flex:1;overflow-y:auto;}
    }

    /* ===== EDIT TOGGLE ===== */
    .edit-toggle{font-size:10px;font-weight:600;padding:3px 10px;border-radius:5px;border:1px solid var(--s3);background:rgba(255,255,255,.6);color:var(--s5);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;text-transform:none;}
    .edit-toggle.on{background:var(--grad-active);color:var(--s0);border-color:transparent;}

    /* ===== CAT TABS ===== */
    .cat-wrap{padding:9px 10px;background:rgba(255,255,255,.4);border-bottom:1px solid var(--s3);display:flex;flex-wrap:wrap;gap:5px;position:sticky;top:42px;z-index:9;flex-shrink:0;}
    .cat-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--s3);background:rgba(255,255,255,.6);color:var(--s5);transition:all .14s;font-family:'Noto Sans JP',sans-serif;}
    .cat-btn:hover{border-color:var(--s4);color:var(--s6);}
    .cat-btn.active{background:var(--grad-active);color:var(--s0);border-color:transparent;box-shadow:var(--shadow-sm);}

    /* ===== SEARCH ===== */
    .search-wrap{padding:8px 10px;background:rgba(255,255,255,.35);border-bottom:1px solid var(--s3);position:sticky;top:86px;z-index:8;flex-shrink:0;}
    .search-input{width:100%;padding:7px 13px;border-radius:20px;border:1px solid var(--s3);background:rgba(255,255,255,.7);font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--s6);outline:none;}
    .search-input:focus{border-color:var(--s4);}
    .search-input::placeholder{color:var(--s4);}

    /* ===== MENU LIST ===== */
    .menu-scroll{flex:1;overflow-y:auto;}
    .menu-sec-label{padding:8px 14px 3px;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--s4);}
    .menu-item{display:flex;align-items:center;padding:10px 13px;cursor:pointer;border-bottom:1px solid rgba(212,204,194,.4);background:transparent;transition:background .12s;gap:8px;}
    .menu-item:hover{background:rgba(212,204,194,.28);}
    .menu-item:hover .add-icon{border-color:var(--s5);color:var(--s5);}
    .menu-item.is-selected{background:rgba(88,78,71,.09);border-left:3px solid var(--s6);padding-left:11px;}
    .menu-item.is-selected .menu-name{color:var(--s6);font-weight:700;}
    .menu-item.is-selected .add-icon{background:var(--grad-active);color:var(--s0);border-color:transparent;}
    .sel-count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;background:var(--grad-active);color:var(--s0);font-size:9px;font-weight:700;padding:0 4px;margin-left:5px;vertical-align:middle;line-height:1;}
    .menu-info{flex:1;min-width:0;}
    .menu-name{font-size:12px;font-weight:500;color:var(--s6);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .menu-meta{font-size:10px;color:var(--s4);display:flex;gap:8px;}
    .menu-pt{font-size:17px;font-weight:900;color:var(--s5);min-width:44px;text-align:right;line-height:1;flex-shrink:0;}
    .menu-pt small{font-size:9px;font-weight:300;}
    .add-icon{width:22px;height:22px;border-radius:50%;border:1px solid var(--s3);color:var(--s4);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all .12s;}

    /* ===== EDIT MODE ===== */
    .menu-item-edit{padding:8px 10px;border-bottom:1px solid rgba(212,204,194,.4);background:rgba(255,255,255,.4);display:flex;align-items:center;gap:5px;}
    .edit-fields{flex:1;display:grid;grid-template-columns:1fr 68px 56px 50px;gap:4px;}
    .ef-wrap{display:flex;flex-direction:column;}
    .ef-label{font-size:9px;color:var(--s4);margin-bottom:2px;}
    .ef{padding:4px 7px;border-radius:4px;border:1px solid var(--s3);background:rgba(255,255,255,.8);font-size:11px;font-family:'Noto Sans JP',sans-serif;color:var(--s6);outline:none;width:100%;}
    .ef:focus{border-color:var(--s4);}
    .del-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--s3);background:rgba(255,255,255,.6);color:var(--s4);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s;}
    .del-btn:hover{border-color:var(--s5);color:var(--s6);}
    .add-row-wrap{padding:6px 10px;border-bottom:1px solid rgba(212,204,194,.4);}
    .add-row-btn{width:100%;padding:6px;border-radius:6px;border:1px dashed var(--s3);background:transparent;color:var(--s4);font-size:11px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .13s;}
    .add-row-btn:hover{border-color:var(--s4);color:var(--s5);}

    /* ===== VISIT TABS ===== */
    .visit-tabs{display:flex;gap:8px;padding:9px 10px;background:rgba(255,255,255,.35);border-bottom:1px solid var(--s3);flex-shrink:0;}
    .visit-tab{flex:1;padding:7px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--s3);background:rgba(255,255,255,.6);color:var(--s5);font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
    .visit-tab.active{background:var(--grad-active);color:var(--s0);border-color:transparent;box-shadow:var(--shadow-sm);}

    /* ===== SELECTED ===== */
    .selected-area{padding:10px;}
    .empty-msg{text-align:center;padding:40px 16px;color:var(--s4);font-size:12px;font-weight:300;line-height:2.4;}
    .empty-icon{font-size:20px;opacity:.3;margin-bottom:6px;letter-spacing:4px;}
    .v-label{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--s4);margin:8px 2px 6px;padding-bottom:4px;border-bottom:1px solid var(--s3);}
    .sel-item{display:flex;align-items:center;gap:7px;padding:7px 10px;margin-bottom:4px;border-radius:8px;background:rgba(255,255,255,.7);border:1px solid var(--s3);box-shadow:var(--shadow-sm);animation:fadeUp .16s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
    .v-badge{width:18px;height:18px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .b1{background:var(--grad-active);color:var(--s0);}
    .b2{background:var(--grad-btn);color:var(--s0);}
    .sel-name{flex:1;font-size:12px;font-weight:400;color:var(--s6);}
    .sel-pt{font-size:13px;font-weight:700;color:var(--s5);flex-shrink:0;}
    .rm-btn{background:none;border:none;cursor:pointer;color:var(--s3);font-size:15px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;}
    .rm-btn:hover{background:var(--s2);color:var(--s6);}

    /* ===== RESULT ===== */
    .result-inner{padding:14px;}
    .empty-msg-r{text-align:center;padding:48px 16px;color:var(--s4);font-size:12px;font-weight:300;line-height:2.4;}

    .total-card{border-radius:14px;padding:20px 16px;text-align:center;margin-bottom:10px;background:var(--grad-total);border:1px solid var(--s3);box-shadow:var(--shadow-md);position:relative;overflow:hidden;}
    .total-card::before{content:'';position:absolute;top:-24px;right:-24px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.3);}
    .total-card::after{content:'';position:absolute;bottom:-14px;left:-14px;width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.18);}
    .tc-label{font-size:9px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--s5);margin-bottom:6px;}
    .tc-pts{font-size:58px;font-weight:900;color:var(--s6);line-height:1;margin-bottom:2px;}
    .tc-pts small{font-size:15px;font-weight:300;}
    .tc-sub{font-size:11px;color:var(--s5);margin-top:4px;}

    .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
    .stat-box{border-radius:9px;padding:9px 11px;border:1px solid var(--s3);box-shadow:var(--shadow-sm);}
    .stat-box:first-child{background:linear-gradient(135deg,#ddd8d0,#ece7e0);}
    .stat-box:last-child{background:linear-gradient(135deg,#cec6bc,#ddd8d0);}
    .sb-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--s4);margin-bottom:2px;}
    .sb-val{font-size:20px;font-weight:900;color:var(--s6);line-height:1;}
    .sb-val small{font-size:10px;font-weight:300;}

    .savings-card{border-radius:11px;padding:12px 15px;margin-bottom:10px;background:var(--grad-savings);border:1px solid var(--s4);text-align:center;box-shadow:var(--shadow-sm);}
    .sv-label{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--s5);margin-bottom:4px;}
    .sv-amt{font-size:30px;font-weight:900;color:var(--s6);line-height:1;}
    .sv-sub{font-size:10px;color:var(--s5);margin-top:3px;}

    .over-card{border-radius:8px;padding:9px 13px;margin-bottom:10px;background:var(--s2);border:1px solid var(--s4);color:var(--s5);font-size:11px;text-align:center;}

    /* ===== おすすめコース — 大きく目立たせる ===== */
    .rec-section-label{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--s4);margin:4px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--s3);}

    .rec-card{border-radius:14px;padding:16px;margin-bottom:10px;background:linear-gradient(145deg,#c8c0b6,#b8b0a6);border:1px solid var(--s4);box-shadow:var(--shadow-md);position:relative;overflow:hidden;}
    .rec-card::before{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.15);}
    .rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .rc-name{font-size:15px;font-weight:900;color:var(--s0);letter-spacing:.5px;}
    .rc-badge{font-size:9px;font-weight:700;letter-spacing:.5px;background:rgba(255,255,255,.3);color:var(--s0);padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.4);}
    .rc-pts-row{display:flex;align-items:baseline;gap:5px;margin-bottom:6px;}
    .rc-pts{font-size:11px;color:rgba(255,255,255,.7);}
    .rc-fee{font-size:32px;font-weight:900;color:var(--s0);line-height:1;}
    .rc-fee small{font-size:12px;font-weight:300;}
    .rc-save{font-size:12px;font-weight:600;color:rgba(255,255,255,.85);margin-top:4px;}

    /* 隣接コース（小さく） */
    .nearby-wrap{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
    .nearby-card{border-radius:9px;padding:10px 11px;border:1px solid var(--s3);background:rgba(255,255,255,.55);}
    .nc-label{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--s4);margin-bottom:2px;}
    .nc-name{font-size:11px;font-weight:700;color:var(--s6);margin-bottom:3px;}
    .nc-fee{font-size:14px;font-weight:900;color:var(--s5);}
    .nc-fee small{font-size:9px;font-weight:300;}
    .nc-note{font-size:9px;color:var(--s4);margin-top:2px;}

    .clear-btn{width:100%;padding:9px;border-radius:7px;border:1px solid var(--s3);background:rgba(255,255,255,.5);color:var(--s4);font-size:11px;font-weight:500;cursor:pointer;margin-top:8px;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
    .clear-btn:hover{border-color:var(--s4);color:var(--s6);}

    /* ===== MODAL ===== */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(56,48,43,.35);z-index:500;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px);}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--s1);border-radius:18px;padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 56px rgba(56,48,43,.22);border:1px solid var(--s3);}
    .modal-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
    .modal-icon{width:34px;height:34px;border-radius:9px;background:var(--grad-active);display:flex;align-items:center;justify-content:center;font-size:16px;}
    .modal-title{font-size:16px;font-weight:700;color:var(--s6);}
    .modal-desc{font-size:11px;color:var(--s4);line-height:1.9;margin-bottom:16px;font-weight:300;}
    .drop-zone{border:2px dashed var(--s3);border-radius:12px;padding:24px 18px;text-align:center;cursor:pointer;transition:all .18s;margin-bottom:12px;background:rgba(255,255,255,.4);}
    .drop-zone:hover,.drop-zone.dragover{border-color:var(--s4);background:rgba(255,255,255,.7);}
    .drop-icon{font-size:24px;margin-bottom:6px;opacity:.4;}
    .drop-text{font-size:13px;font-weight:500;color:var(--s5);}
    .drop-sub{font-size:10px;color:var(--s4);margin-top:2px;}
    .format-box{background:rgba(255,255,255,.5);border-radius:9px;border:1px solid var(--s3);padding:10px 12px;margin-bottom:12px;}
    .fmt-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--s4);text-transform:uppercase;margin-bottom:4px;}
    .fmt-code{font-size:11px;color:var(--s6);font-family:monospace;line-height:2;}
    .preview-count{font-size:12px;font-weight:500;color:var(--s6);margin-bottom:6px;}
    .preview-scroll{max-height:160px;overflow-y:auto;border-radius:7px;border:1px solid var(--s3);margin-bottom:6px;}
    .preview-table{width:100%;border-collapse:collapse;font-size:11px;}
    .preview-table th{padding:5px 9px;background:var(--s2);color:var(--s5);text-align:left;font-weight:600;position:sticky;top:0;}
    .preview-table td{padding:4px 9px;border-top:1px solid var(--s2);color:var(--s6);}
    .modal-error{background:var(--s2);border:1px solid var(--s3);border-radius:7px;padding:8px 12px;font-size:11px;color:var(--s5);margin-bottom:10px;}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
    .btn-cancel{padding:7px 16px;border-radius:7px;border:1px solid var(--s3);background:rgba(255,255,255,.6);color:var(--s5);font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .14s;}
    .btn-cancel:hover{border-color:var(--s4);}
    .btn-import{padding:7px 20px;border-radius:7px;border:none;background:var(--grad-active);color:var(--s0);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;box-shadow:var(--shadow-sm);transition:all .15s;}
    .btn-import:hover{opacity:.88;}
    .btn-import:disabled{opacity:.3;cursor:not-allowed;}
    /* コース設定モーダル */
    .course-row{display:grid;grid-template-columns:1fr 90px 100px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--s2);}
    .course-row:last-child{border-bottom:none;}
    .course-row-label{font-size:11px;font-weight:600;color:var(--s6);}
    .course-row input{width:100%;padding:7px 10px;border:1px solid var(--s3);border-radius:8px;font-size:12px;font-family:'Noto Sans JP',sans-serif;color:var(--s6);background:rgba(255,255,255,.7);box-sizing:border-box;text-align:right;}
    .course-row input:focus{outline:none;border-color:var(--s5);}
    .cr-head{display:grid;grid-template-columns:1fr 90px 100px;gap:8px;padding:0 0 6px;margin-bottom:4px;border-bottom:2px solid var(--s3);}
    .cr-head span{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--s4);text-align:right;}
    .cr-head span:first-child{text-align:left;}
        ::-webkit-scrollbar{width:3px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px;}
  </style>
</head>
<body>

<header>
  <div class="logo-badge">AIS</div>
  <div style="display:flex;flex-direction:column;gap:1px;">
    <div class="logo-name">POINT</div>
    <div class="logo-sub">計算機</div>
  </div>

function renderMenu(){
  var el=document.getElementById('menuList'),q=searchQ.trim(),h='';
  if(editMode){
    getCats().forEach(function(cat){
      var items=menuData.filter(function(m){return m.category===cat;});
      h+='<div class="menu-sec-label">'+esc(cat)+'</div>';
      items.forEach(function(m){var i=menuData.indexOf(m);h+='<div class="menu-item-edit"><div class="edit-fields"><div class="ef-wrap"><div class="ef-label">メニュー名</div><input class="ef" type="text" data-idx="'+i+'" data-field="name" value="'+esc(m.name)+'"></div><div class="ef-wrap"><div class="ef-label">定価(¥)</div><input class="ef" type="number" data-idx="'+i+'" data-field="price" value="'+m.price+'"></div><div class="ef-wrap"><div class="ef-label">時間(分)</div><input class="ef" type="number" data-idx="'+i+'" data-field="time" value="'+m.time+'"></div><div class="ef-wrap"><div class="ef-label">pt</div><input class="ef" type="number" data-idx="'+i+'" data-field="points" value="'+m.points+'"></div></div><button class="del-btn" data-del="'+i+'">×</button></div>';});
      h+='<div class="add-row-wrap"><button class="add-row-btn" data-addcat="'+esc(cat)+'">＋ '+esc(cat)+' に追加</button></div>';
    });
    h+='<div class="add-row-wrap"><button class="add-row-btn" data-addcat="__new__">＋ 新しいカテゴリを追加</button></div>';
  } else {
    var f=menuData.filter(function(m){return(selCat===null||m.category===selCat)&&(q===''||m.name.indexOf(q)>=0||m.category.indexOf(q)>=0);});
    if(!f.length){el.innerHTML='<div class="empty-msg"><div class="empty-icon">— —</div>見つかりませんでした</div>';return;}
    var cats=[];f.forEach(function(m){if(cats.indexOf(m.category)<0)cats.push(m.category);});
    cats.forEach(function(cat){
      var items=f.filter(function(m){return m.category===cat;});
      if(!selCat&&q==='')h+='<div class="menu-sec-label">'+esc(cat)+'</div>';

    });

}

function renderSelected(){

function renderResult(){
  var el=document.getElementById('resultPanel');
  var v1p=0,v1r=0,v1t=0,v2p=0,v2r=0,v2t=0;
  visit1.forEach(function(m){v1p+=m.points;v1r+=m.price;v1t+=m.time;});
  visit2.forEach(function(m){v2p+=m.points;v2r+=m.price;v2t+=m.time;});
  var total=v1p+v2p,tp=v1r+v2r,tt=v1t+v2t;
  if(!total){el.innerHTML='<div class="empty-msg-r"><div class="empty-icon" style="opacity:.3;font-size:18px;letter-spacing:4px;">— —</div>メニューを選ぶと<br>ここに結果が表示されます</div>';return;}

  /* おすすめコース計算 */
  var recIdx=courses.length-1;
  for(var i=0;i<courses.length;i++){if(courses[i].points>=total){recIdx=i;break;}}
  var rec=courses[recIdx];
  var over=total>courses[courses.length-1].points;
  var sav=tp-rec.fee;
  var h='';

  /* 合計カード */
  h+='<div class="total-card"><div class="tc-label">合計ポイント</div><div class="tc-pts">'+total+'<small> pt</small></div><div class="tc-sub">定価合計 ¥'+tp.toLocaleString()+'　／　'+tt+'分</div></div>';

  /* 1回目 / 2回目の内訳（2回目がある場合のみ） */
  if(visit2.length){h+='<div class="stat-row"><div class="stat-box"><div class="sb-label">1 回 目</div><div class="sb-val">'+v1p+'<small> pt</small></div></div><div class="stat-box"><div class="sb-label">2 回 目</div><div class="sb-val">'+v2p+'<small> pt</small></div></div></div>';}

  /* 超過メッセージ */
  if(over){h+='<div class="over-card">プレミアムコース（'+courses[courses.length-1].points+'pt）を超えています</div>';}

  /* おすすめコース — 大きく */
  h+='<div class="rec-section-label">おすすめコース</div>';
  h+='<div class="rec-card">';
  h+='<div class="rc-top"><span class="rc-name">'+rec.name+'</span><span class="rc-badge">おすすめ</span></div>';
  h+='<div class="rc-pts-row"><span class="rc-pts">'+rec.points+'pt まで対応</span></div>';
  h+='<div class="rc-fee">¥'+rec.fee.toLocaleString()+'<small> /月</small></div>';
  if(sav>0&&!over)h+='<div class="rc-save">定価比 ¥'+sav.toLocaleString()+' お得</div>';
  h+='</div>';

  /* 貯蓄カード */
  if(sav>0&&!over)h+='<div class="savings-card"><div class="sv-label">コース利用でお得な金額</div><div class="sv-amt">¥'+sav.toLocaleString()+'</div><div class="sv-sub">— 定価よりお得 —</div></div>';

  /* 隣接コース（前後1つずつ、あれば） */
  var prevC=recIdx>0?courses[recIdx-1]:null;
  var nextC=recIdx<courses.length-1?courses[recIdx+1]:null;
  if(prevC||nextC){
    h+='<div class="nearby-wrap">';
    if(prevC){var ps=tp-prevC.fee;h+='<div class="nearby-card"><div class="nc-label">ひとつ下</div><div class="nc-name">'+prevC.name+'</div><div class="nc-fee">¥'+prevC.fee.toLocaleString()+'<small>/月</small></div><div class="nc-note">'+(total-prevC.points)+'pt 超過</div></div>';}
    else{h+='<div></div>';}
    if(nextC){var ns=tp-nextC.fee;h+='<div class="nearby-card"><div class="nc-label">ひとつ上</div><div class="nc-name">'+nextC.name+'</div><div class="nc-fee">¥'+nextC.fee.toLocaleString()+'<small>/月</small></div><div class="nc-note">あと'+(nextC.points-total)+'pt で対応</div></div>';}
    else{h+='<div></div>';}
    h+='</div>';
  }

  h+='<button class="clear-btn" id="clearBtn">すべてクリア</button>';
  el.innerHTML=h;
}

function handleEditClick(e){
  var d=e.target.closest('[data-del]');if(d){menuData.splice(parseInt(d.dataset.del),1);renderMenu();return;}
  var a=e.target.closest('[data-addcat]');if(a){var cat=a.dataset.addcat;if(cat==='__new__'){cat=prompt('新しいカテゴリ名:');if(!cat||!cat.trim())return;cat=cat.trim();}menuData.push({category:cat,name:'新しいメニュー',points:0,price:0,time:0});renderMenu();setTimeout(function(){var inp=document.querySelectorAll('.ef[data-field="name"]');if(inp.length)inp[inp.length-1].focus();},50);}
}

function openModal(){document.getElementById('csvModal').classList.add('open');resetModal();}
function closeModal(){document.getElementById('csvModal').classList.remove('open');}
function resetModal(){parsedCSV=[];document.getElementById('csvError').style.display='none';document.getElementById('csvPreview').style.display='none';document.getElementById('importBtn').disabled=true;document.getElementById('dropText').textContent='クリックしてファイルを選択';document.getElementById('csvFileInput').value='';}
function parseLine(l){var r=[],c='',q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}
function processFile(file){
  if(!file.name.toLowerCase().match(/\.csv$/)){showErr('CSVファイル（.csv）を選択してください');return;}
  document.getElementById('dropText').textContent='📄 '+file.name;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result.replace(/^\uFEFF/,'');
    var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!=='';});
    if(lines.length<2){showErr('データが足りません');return;}
    var result=[],errors=[];
    for(var i=1;i<lines.length;i++){var cols=parseLine(lines[i]);if(cols.length<5){if(cols.length>1)errors.push(i+1);continue;}var cat=cols[0].trim(),name=cols[1].trim(),pts=parseInt(cols[2].replace(/\D/g,'')),prc=parseInt(cols[3].replace(/\D/g,'')),tim=parseInt(cols[4].replace(/\D/g,''));if(!cat||!name||isNaN(pts)||isNaN(prc)||isNaN(tim)){errors.push(i+1);continue;}result.push({category:cat,name:name,points:pts,price:prc,time:tim});}
    if(!result.length){showErr('有効なデータがありません');return;}
    parsedCSV=result;showPreview(result,errors);
  };
  reader.readAsText(file,'UTF-8');
}
function showErr(msg){var el=document.getElementById('csvError');el.textContent=msg;el.style.display='block';document.getElementById('csvPreview').style.display='none';document.getElementById('importBtn').disabled=true;}
function showPreview(data,errors){document.getElementById('csvError').style.display='none';document.getElementById('previewCount').textContent=data.length+'件を読み込みました'+(errors.length?' （'+errors.length+'件スキップ）':'');document.getElementById('previewBody').innerHTML=data.slice(0,30).map(function(m){return'<tr><td>'+esc(m.category)+'</td><td>'+esc(m.name)+'</td><td>'+m.points+'pt</td><td>¥'+m.price.toLocaleString()+'</td><td>'+m.time+'分</td></tr>';}).join('');document.getElementById('csvPreview').style.display='block';document.getElementById('importBtn').disabled=false;}
function executeImport(){if(!parsedCSV.length)return;menuData=parsedCSV;selCat=null;searchQ='';visit1=[];visit2=[];closeModal();renderCats();renderMenu();renderSelected();renderResult();}

(function(){
  /* モバイルナビ */
  document.querySelectorAll('.mnav-btn').forEach(function(b){
    b.addEventListener('click',function(){switchMobilePanel(this.dataset.target);});
  });

  document.getElementById('editToggle').addEventListener('click',toggleEdit);
  document.getElementById('csvOpenBtn').addEventListener('click',openModal);
  document.getElementById('csvCancelBtn').addEventListener('click',closeModal);
  document.getElementById('importBtn').addEventListener('click',executeImport);
  document.getElementById('csvModal').addEventListener('click',function(e){if(e.target===this)closeModal();});

  var dz=document.getElementById('dropZone');
  dz.addEventListener('click',function(){document.getElementById('csvFileInput').click();});
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover');});
  dz.addEventListener('dragleave',function(){dz.classList.remove('dragover');});
  dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);});
  document.getElementById('csvFileInput').addEventListener('change',function(e){if(e.target.files[0])processFile(e.target.files[0]);});

  document.getElementById('tab1').addEventListener('click',function(){activeVisit=1;this.className='visit-tab active';document.getElementById('tab2').className='visit-tab';});
  document.getElementById('tab2').addEventListener('click',function(){activeVisit=2;this.className='visit-tab active';document.getElementById('tab1').className='visit-tab';});
  document.getElementById('searchInput').addEventListener('input',function(){searchQ=this.value;renderMenu();});

  document.getElementById('catWrap').addEventListener('click',function(e){var b=e.target.closest('.cat-btn');if(!b)return;selCat=b.dataset.cat===''?null:b.dataset.cat;renderCats();renderMenu();});
  document.getElementById('menuList').addEventListener('click',function(e){if(editMode){handleEditClick(e);return;}var item=e.target.closest('[data-idx]');if(!item)return;addMenu(parseInt(item.dataset.idx));});
  document.getElementById('menuList').addEventListener('input',function(e){if(editMode)handleEditInput(e);});
  document.getElementById('selectedArea').addEventListener('click',function(e){var b=e.target.closest('.rm-btn');if(!b)return;removeMenu(parseFloat(b.dataset.uid),parseInt(b.dataset.visit));});
  document.getElementById('resultPanel').addEventListener('click',function(e){if(e.target&&e.target.id==='clearBtn')clearAll();});
  // コース設定モーダル
  function openCourseModal(){
    var html='<div class="cr-head"><span>コース名</span><span>ポイント</span><span>料金(円)</span></div>';
    courses.forEach(function(c,i){
      html+='<div class="course-row"><div class="course-row-label">'+esc(c.name)+'</div><input type="number" min="1" data-ci="'+i+'" data-field="points" value="'+c.points+'"><input type="number" min="0" data-ci="'+i+'" data-field="fee" value="'+c.fee+'"></div>';
    });
    document.getElementById('courseRows').innerHTML=html;
    document.getElementById('courseModal').style.display='flex';
  }
  function closeCourseModal(){document.getElementById('courseModal').style.display='none';}
  function saveCourses(){
    var inputs=document.querySelectorAll('#courseRows input');
    inputs.forEach(function(inp){var i=parseInt(inp.dataset.ci),f=inp.dataset.field,v=parseInt(inp.value)||0;courses[i][f]=v;});
    localStorage.setItem('aisCourses',JSON.stringify(courses));
    closeCourseModal();renderResult();
  }
  document.getElementById('courseSettingBtn').addEventListener('click',openCourseModal);
  document.getElementById('courseCancelBtn').addEventListener('click',closeCourseModal);
  document.getElementById('courseModal').addEventListener('click',function(e){if(e.target===this)closeCourseModal();});
  document.getElementById('courseResetBtn').addEventListener('click',function(){
    courses=JSON.parse(JSON.stringify(defaultCourses));
    localStorage.removeItem('aisCourses');
    closeCourseModal();renderResult();
  });
  document.getElementById('courseSaveBtn').addEventListener('click',saveCourses);
})();

renderCats();renderMenu();renderSelected();renderResult();
</script>
</body>
</html>
